services:

  # ──────────────────────────────────────────────
  # Squid: 送信先制限プロキシ
  # - claude-code / zap 両方の外部通信を中継する
  # - 許可宛先: Anthropic API + TARGET_URLのドメイン のみ
  # - entrypointスクリプトで起動時に.envのTARGET_URLを読んでsquid.confを生成する
  # ──────────────────────────────────────────────
  squid:
    image: ubuntu/squid:6.1-23.10_beta
    container_name: squid
    environment:
      - TARGET_URL=${TARGET_URL}
    entrypoint: ["/bin/sh", "/squid-config/entrypoint.sh"]
    volumes:
      - ./squid-config:/squid-config:ro
    networks:
      - proxy    # claude-code / zap からのリクエストを受け付ける
      - external # 外部（Anthropic API / 診断対象）への通信
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ──────────────────────────────────────────────
  # ZAP: スパイダー/スキャンエンジン
  # - 外部通信はすべてSquid経由（HTTP_PROXY設定）
  # - ZAP自身のAPI（内部通信）はNO_PROXYで除外
  # ──────────────────────────────────────────────
  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: zap
    command: >
      zap.sh -daemon
      -host 0.0.0.0
      -port 8080
      -config api.key=${ZAP_API_KEY}
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
      -dir /home/zap/.ZAP
      -config database.newsession=3
    environment:
      # 診断対象へのアクセスもSquid経由
      - HTTP_PROXY=http://squid:3128
      - HTTPS_PROXY=http://squid:3128
      # ZAP自身のAPI・localhost系はプロキシを通さない
      - NO_PROXY=127.0.0.1,localhost
    volumes:
      - ./zap-config:/home/zap/.ZAP
      - ./reports:/zap/reports
    networks:
      - internal # claude-codeとの内部通信
      - proxy    # Squidへの接続
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - squid
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/JSON/core/view/version/?apikey=${ZAP_API_KEY}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ──────────────────────────────────────────────
  # Claude Code: 診断エージェント
  # - 外部通信はSquid経由（Anthropic APIのみ許可）
  # - ZAPとの通信はinternal network内で完結
  # - ZAPのAPI（内部通信）はNO_PROXYで除外
  # ──────────────────────────────────────────────
  claude-code:
    build:
      context: ./claude-code
      dockerfile: Dockerfile
    container_name: claude-code
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ZAP_API_KEY=${ZAP_API_KEY}
      - ZAP_BASE_URL=http://zap:8080
      - TARGET_URL=${TARGET_URL}
      # Anthropic APIはSquid経由
      - HTTP_PROXY=http://squid:3128
      - HTTPS_PROXY=http://squid:3128
      # ZAPへの内部通信・localhost系はプロキシを通さない
      - NO_PROXY=zap,127.0.0.1,localhost
    volumes:
      - ./reports:/workspace/reports
    user: "1001:1001"
    networks:
      - internal # ZAPとの内部通信
      - proxy    # Squidへの接続
    cap_drop:
      - ALL
    depends_on:
      zap:
        condition: service_healthy

networks:
  # claude-code ↔ zap 専用。external: falseで外部通信不可
  internal:
    driver: bridge
    internal: true

  # claude-code / zap → squid 専用
  proxy:
    driver: bridge
    internal: true  # Squidコンテナ自体はexternalに所属するので、proxyはinternal:trueで問題ない

  # squid → 外部（Anthropic API / 診断対象）
  external:
    driver: bridge
